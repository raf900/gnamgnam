<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>gnamgnam</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <a href="#" class="site-title">Gnam Gnam</a>
    <p class="site-tagline">Il mio ricettario personale</p>
  </header>

  <main>
    <!-- Home view -->
    <div id="view-home">
      <section id="plan" class="section">
        <div class="section-header">
          <h2>Piano settimanale</h2>
          <div class="section-actions">
            <button id="btn-shopping" class="btn btn-primary">Genera lista della spesa</button>
            <button id="btn-clear-plan" class="btn btn-ghost">Svuota piano</button>
          </div>
        </div>
        <div id="plan-grid" class="plan-grid"></div>
      </section>

      <section id="shopping-list" class="section" hidden>
        <div class="section-header">
          <h2>Lista della spesa</h2>
          <div class="section-actions">
            <button id="btn-copy-list" class="btn btn-ghost">Copia</button>
            <button id="btn-close-list" class="btn btn-ghost">Chiudi</button>
          </div>
        </div>
        <div id="shopping-list-body" class="card shopping-card"></div>
      </section>

      <section id="recipe-list" class="section">
        <div class="section-header">
          <h2>Le mie ricette</h2>
        </div>
        <div id="recipe-grid" class="recipe-grid"></div>
      </section>
    </div>

    <!-- Recipe detail view -->
    <div id="view-detail" hidden>
      <a href="#" class="back-link">&larr; Tutte le ricette</a>
      <article id="recipe-detail"></article>
    </div>
  </main>

  <!-- Recipe picker for meal plan slots -->
  <dialog id="picker">
    <div class="picker-header">
      <h3 id="picker-title">Scegli una ricetta</h3>
      <button id="picker-close" class="btn btn-ghost" type="button">&times;</button>
    </div>
    <div id="picker-list" class="picker-list"></div>
  </dialog>

  <script src="recipes.js"></script>
  <script src="app.js"></script>
</body>
</html>
